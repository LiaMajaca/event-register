<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CredzOnChain - Blockchain Badge System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: float 20s linear infinite;
            pointer-events: none;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .container {
            background: white;
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 60px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5em;
            color: #2d3748;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.1em;
            color: #718096;
            margin-bottom: 50px;
            line-height: 1.6;
        }

        .button-grid {
            display: grid;
            gap: 20px;
            margin-top: 40px;
        }

        .button {
            display: block;
            text-align: center;
            padding: 24px 32px;
            font-size: 1.15em;
            font-weight: 600;
            border-radius: 16px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .button:hover::before {
            width: 300px;
            height: 300px;
        }

        .button-claim {
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
        }

        .button-claim:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .button-organizer {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }

        .button-organizer:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        .button-view {
            background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
        }

        .button-view:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(96, 165, 250, 0.4);
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 24px;
            }

            h1 {
                font-size: 2em;
            }

            .button {
                padding: 20px 24px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CredzOnChain</h1>
        <p class="subtitle">Secure, verifiable blockchain-based credential system for events and achievements</p>
        
        <div class="button-grid">
            <a href="claim.html" class="button button-claim">
                Claim Your Badge
            </a>
            <a href="organizer.html" class="button button-organizer">
                Organizer Portal
            </a>
            <a href="view_badges.html" class="button button-view">
                View All Badges
            </a>
        </div>
        <div class="navigation">
            <a href="index.html">🏠 Home</a>
            <a href="organizer.html">➕ Create Event</a>
            <a href="claim.html">🎫 Claim Badge</a>
        </div>
    </div>
</body>
</html>
